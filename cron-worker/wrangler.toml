name = "affiliate-auto-publish"
main = "worker.js"
compatibility_date = "2024-01-01"

# Cron trigger: Every day at 6:00 UTC = 8:00 Paris time (summer) or 7:00 (winter)
[triggers]
crons = ["0 6 * * *"]

# KV namespace binding
[[kv_namespaces]]
binding = "AFFILIATE_SITES"
id = "226c34fbc23f49de8b8f3abbc269e1f4"

# Environment variables (set via Cloudflare dashboard or wrangler secret)
# GROQ_API_KEY - for content generation
