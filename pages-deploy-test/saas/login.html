<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - AffiliationPro SAAS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; min-height: 100vh; background: linear-gradient(135deg, #0B1F3A 0%, #2B0F3A 50%, #0B1F3A 100%); color: white; display: flex; align-items: center; justify-content: center; padding: 20px; }
    
    .login-container { max-width: 420px; width: 100%; }
    
    .logo { text-align: center; margin-bottom: 30px; }
    .logo-icon { font-size: 3rem; }
    .logo h1 { font-size: 1.5rem; margin-top: 10px; background: linear-gradient(135deg, #10b981, #059669); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 35px; border: 1px solid rgba(139, 92, 246, 0.2); }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #c7d2fe; font-size: 14px; font-weight: 500; }
    .form-group input { width: 100%; padding: 14px 16px; border: 1px solid rgba(139,92,246,0.3); border-radius: 12px; background: rgba(0,0,0,0.3); color: white; font-size: 15px; }
    .form-group input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
    
    .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(16,185,129,0.4); }
    
    .error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 12px 15px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; display: none; }
    
    .links { text-align: center; margin-top: 20px; }
    .links a { color: #a5b4fc; text-decoration: none; font-size: 14px; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">💎</div>
      <h1>AffiliationPro</h1>
    </div>
    
    <div class="card">
      <div id="error" class="error"></div>
      
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Slug de votre compte</label>
          <input type="text" id="slug" placeholder="monbusiness" required>
        </div>
        <div class="form-group">
          <label>📧 Email</label>
          <input type="email" id="email" placeholder="votre@email.com" required>
        </div>
        <div class="form-group">
          <label>🔑 Mot de passe</label>
          <input type="password" id="password" placeholder="Votre mot de passe" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Se connecter</button>
      </form>
      
      <div class="links">
        <a href="/saas/register">Créer un compte</a>
      </div>
    </div>
  </div>
  
  <script>
    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }
    
    async function handleLogin(e) {
      e.preventDefault();
      
      const slug = document.getElementById('slug').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      
      btn.disabled = true;
      btn.textContent = 'Connexion...';
      
      try {
        const res = await fetch('/api/saas/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug, email, password })
        });
        
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('saas_slug', slug);
          localStorage.setItem('saas_email', email);
          window.location.href = '/saas/' + slug + '/admin';
        } else {
          showError(data.error || 'Erreur de connexion');
          btn.disabled = false;
          btn.textContent = 'Se connecter';
        }
      } catch (err) {
        showError('Erreur: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }
  </script>
</body>
</html>
