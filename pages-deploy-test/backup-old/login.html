<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - PublicationCashflow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      min-height: 100vh; 
      background: linear-gradient(135deg, #0B1F3A 0%, #2B0F3A 50%, #0B1F3A 100%); 
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      max-width: 420px;
      width: 100%;
    }
    
    .login-card {
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 40px;
      border: 1px solid rgba(139, 92, 246, 0.3);
      box-shadow: 0 25px 80px rgba(139, 92, 246, 0.2);
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 2rem;
    }
    
    .logo h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .logo p {
      color: #a5b4fc;
      font-size: 14px;
      margin-top: 5px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #c7d2fe;
      font-weight: 500;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 12px;
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 15px;
      transition: all 0.2s;
    }
    
    input:focus {
      outline: none;
      border-color: #a855f7;
      box-shadow: 0 0 20px rgba(168,85,247,0.2);
    }
    
    input::placeholder {
      color: #6b7280;
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      box-shadow: 0 10px 40px rgba(99,102,241,0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 50px rgba(99,102,241,0.4);
    }
    
    .error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    
    .error.show {
      display: block;
    }
    
    .footer-text {
      text-align: center;
      margin-top: 25px;
      color: #6b7280;
      font-size: 13px;
    }
    
    .footer-text a {
      color: #a5b4fc;
      text-decoration: none;
    }
    
    .footer-text a:hover {
      color: #c4b5fd;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">💜</div>
        <h1>PublicationCashflow</h1>
        <p>Espace Entrepreneur</p>
      </div>
      
      <div id="errorMsg" class="error">
        ❌ Email ou mot de passe incorrect
      </div>
      
      <form onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label>📧 Email</label>
          <input type="email" id="loginEmail" placeholder="votre@email.com" required>
        </div>
        
        <div class="form-group">
          <label>🔐 Mot de passe</label>
          <input type="password" id="loginPassword" placeholder="Votre mot de passe" required>
        </div>
        
        <button type="submit" class="btn btn-primary">
          🚀 Accéder à mon espace
        </button>
      </form>
      
      <p class="footer-text">
        Pas encore membre ? <a href="https://www.publication-web.com/affiliation/paiement" target="_blank">Rejoindre l'aventure</a>
      </p>
    </div>
  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Vérifier si déjà connecté
      const session = sessionStorage.getItem('entrepreneur_session');
      if (session) {
        window.location.href = '/home';
      }
    });
    
    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.querySelector('.btn-primary');
      
      // État de chargement
      btn.disabled = true;
      btn.textContent = '⏳ Connexion...';
      errorMsg.classList.remove('show');
      
      console.log('🔐 Tentative de connexion pour:', email);
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        console.log('📡 Statut réponse:', res.status);
        const data = await res.json();
        console.log('📦 Données reçues:', data);
        
        if (data.success) {
          console.log('✅ Connexion réussie!');
          
          // Session en cookie (pour le middleware serveur)
          const cookieValue = `entrepreneur_session=${encodeURIComponent(email)}; path=/; max-age=${60 * 60 * 24 * 30}; SameSite=Lax`;
          document.cookie = cookieValue;
          console.log('🍪 Cookie défini:', cookieValue);
          
          // Session en sessionStorage (pour le JS client)
          const sessionData = {
            email: email,
            name: data.name || email.split('@')[0],
            loggedAt: new Date().toISOString()
          };
          sessionStorage.setItem('entrepreneur_session', JSON.stringify(sessionData));
          console.log('💾 Session stockée:', sessionData);
          
          // Rediriger vers la page demandée ou /home
          const params = new URLSearchParams(window.location.search);
          const redirect = params.get('redirect') || '/home';
          console.log('🔀 Redirection vers:', redirect);
          
          // Forcer la redirection
          setTimeout(() => {
            window.location.href = redirect;
          }, 100);
        } else {
          console.log('❌ Échec connexion:', data.error);
          errorMsg.textContent = data.error || 'Email ou mot de passe incorrect';
          errorMsg.classList.add('show');
          btn.disabled = false;
          btn.textContent = '🚀 Accéder à mon espace';
        }
      } catch (err) {
        console.error('💥 Erreur fetch:', err);
        errorMsg.textContent = 'Erreur de connexion: ' + err.message;
        errorMsg.classList.add('show');
        btn.disabled = false;
        btn.textContent = '🚀 Accéder à mon espace';
      }
      
      return false;
    }
  </script>
</body>
</html>
