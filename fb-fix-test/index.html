<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Affiliate Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0B1F3A 0%, #2B0F3A 50%, #0B1F3A 100%);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    
    .container { max-width: 650px; width: 100%; margin-top: 30px; }
    
    h1 {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle { text-align: center; color: #a5b4fc; margin-bottom: 30px; }
    
    .card {
      background: rgba(18, 18, 42, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 15px;
    }
    
    label { display: block; margin-bottom: 6px; color: #c7d2fe; font-weight: 500; font-size: 14px; }
    
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 15px;
      margin-bottom: 15px;
    }
    
    input::placeholder { color: #6b7280; }
    
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 15px;
      margin-bottom: 15px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
    }
    
    textarea::placeholder { color: #6b7280; }
    
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }
    
    button:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    
    .result {
      margin-top: 15px;
      padding: 15px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      display: none;
    }
    
    .result a { color: #4ade80; word-break: break-all; }
    
    .error {
      margin-top: 15px;
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: #fca5a5;
      display: none;
    }
    
    .logo {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 26px;
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
    }
    
    .templates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
    
    @media (max-width: 500px) {
      .templates { grid-template-columns: repeat(2, 1fr); }
    }
    
    .template-btn {
      flex: 1;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(99,102,241,0.2);
      border-radius: 8px;
      color: #a5b4fc;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
    }
    
    .template-btn.active {
      border-color: #6366f1;
      background: rgba(99,102,241,0.2);
      color: white;
    }
    
    .copy-btn {
      margin-top: 10px;
      padding: 8px;
      font-size: 13px;
      background: rgba(99,102,241,0.3);
    }
    
    .image-preview {
      margin-top: 10px;
      text-align: center;
      display: none;
    }
    
    .image-preview img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 8px;
      border: 2px solid rgba(99,102,241,0.3);
    }
    
    .section-title {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 20px 0 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(99,102,241,0.1);
    }
    
    .footer-text {
      text-align: center; 
      color: #6b7280; 
      font-size: 12px; 
      margin-top: 20px;
    }
    
    /* Facebook Section */
    .facebook-section {
      margin-top: 20px;
      padding: 20px;
      background: rgba(24, 119, 242, 0.1);
      border: 1px solid rgba(24, 119, 242, 0.3);
      border-radius: 12px;
      display: none;
    }
    
    .facebook-section h3 {
      color: #1877f2;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .facebook-section p {
      font-size: 14px;
      color: #a5b4fc;
      margin-bottom: 15px;
    }
    
    .fb-btn {
      background: #1877f2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .fb-btn:hover { background: #166fe5; }
    
    .page-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(24, 119, 242, 0.15);
      border: 1px solid rgba(24, 119, 242, 0.3);
      border-radius: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .page-item:hover { background: rgba(24, 119, 242, 0.25); }
    
    .page-item img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    
    .page-item .page-name { font-weight: 600; }
    .page-item .page-category { font-size: 12px; opacity: 0.7; }
    
    .status-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
    }
    
    .status-success p { color: #4ade80; }
    
    .disconnect-btn {
      background: rgba(239, 68, 68, 0.8);
      padding: 8px 16px;
      font-size: 13px;
      margin-top: 10px;
      width: auto;
      display: inline-block;
    }
    
    .disconnect-btn:hover { background: rgba(239, 68, 68, 1); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚡</div>
    <h1>AI Affiliate Builder</h1>
    <p class="subtitle">Générez votre page affiliée en 10 secondes</p>
    
    <div class="card">
      <label>🔗 Votre lien affilié *</label>
      <input type="url" id="link" placeholder="https://votre-lien-affilie.com">
      
      <label>📦 Nom du produit</label>
      <input type="text" id="name" placeholder="Ex: iPhone 15 Pro Max">
      
      <label>🖼️ URL de l'image du produit</label>
      <input type="url" id="image" placeholder="https://exemple.com/image.jpg" onchange="previewImage()">
      <div id="imagePreview" class="image-preview">
        <img id="previewImg" src="" alt="Aperçu">
      </div>
      
      <label>📂 Niche</label>
      <input type="text" id="niche" placeholder="Ex: Fitness, Santé, Technologie">
      
      <label>✍️ Description personnalisée <span style="color:#6b7280;font-weight:normal">(optionnel)</span></label>
      <textarea id="customDescription" placeholder="Décrivez votre produit..." rows="3"></textarea>
      
      <label>🎯 Points forts <span style="color:#6b7280;font-weight:normal">(optionnel - un par ligne)</span></label>
      <textarea id="customFeatures" placeholder="Ex:&#10;100% naturel&#10;Livraison gratuite" rows="3"></textarea>
      
      <div class="section-title">Choisir un template</div>
      <div class="templates">
        <button class="template-btn active" data-template="modern">✨ Moderne</button>
        <button class="template-btn" data-template="dark">🌙 Dark Pro</button>
        <button class="template-btn" data-template="minimal">◻️ Minimal</button>
        <button class="template-btn" data-template="gradient">🎨 Gradient</button>
        <button class="template-btn" data-template="neon">💡 Néon</button>
        <button class="template-btn" data-template="nature">🌿 Nature</button>
        <button class="template-btn" data-template="recipe">🍽️ Recette</button>
        <button class="template-btn" data-template="holistic">☯️ Holistique</button>
        <button class="template-btn" data-template="mystical">🔮 Mystique</button>
      </div>
      
      <button id="generateBtn" onclick="generate()">⚡ Générer ma page</button>
      
      <div id="error" class="error"></div>
      
      <div id="result" class="result">
        <p style="margin-bottom:8px; color: #4ade80;">✅ Votre page est prête!</p>
        <a id="resultUrl" href="" target="_blank"></a>
        <button class="copy-btn" onclick="copyUrl()">📋 Copier le lien</button>
      </div>
      
      <!-- Facebook Auto-Publish Section -->
      <div id="facebookSection" class="facebook-section">
        <h3>📱 Publication automatique Facebook</h3>
        <p>Connectez votre Page Facebook pour activer la publication automatique quotidienne générée par IA.</p>
        
        <div id="fbNotConnected">
          <button class="fb-btn" onclick="connectFacebook()">
            <span>📘</span> Connecter ma Page Facebook
          </button>
        </div>
        
        <div id="fbPagesList" style="display:none;"></div>
        <div id="fbStatus"></div>
      </div>
    </div>
    
    <p class="footer-text">Propulsé par l'IA • Créé par Publication-Web</p>
  </div>
  
  <script>
  let selectedTemplate = 'modern';
  let currentSiteId = '';
  let currentProductName = '';
  let currentSiteUrl = '';
  
  document.querySelectorAll('.template-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedTemplate = btn.dataset.template;
    });
  });
  
  function previewImage() {
    const url = document.getElementById('image').value;
    const preview = document.getElementById('imagePreview');
    const img = document.getElementById('previewImg');
    if (url) {
      img.src = url;
      preview.style.display = 'block';
      img.onerror = () => { preview.style.display = 'none'; };
    } else {
      preview.style.display = 'none';
    }
  }
  
  async function generate() {
    const link = document.getElementById('link').value;
    const name = document.getElementById('name').value;
    const image = document.getElementById('image').value;
    const niche = document.getElementById('niche').value;
    const customDescription = document.getElementById('customDescription').value;
    const customFeatures = document.getElementById('customFeatures').value;
    const btn = document.getElementById('generateBtn');
    const result = document.getElementById('result');
    const error = document.getElementById('error');
    
    if (!link) {
      error.textContent = 'Veuillez entrer un lien affilié';
      error.style.display = 'block';
      return;
    }
    
    btn.disabled = true;
    btn.textContent = '⏳ Génération en cours...';
    error.style.display = 'none';
    result.style.display = 'none';
    document.getElementById('facebookSection').style.display = 'none';
    
    try {
      const res = await fetch('/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          link,
          name: name || null,
          image: image || null,
          niche: niche || null,
          template: selectedTemplate,
          customDescription: customDescription || null,
          customFeatures: customFeatures || null
        })
      });
      
      const data = await res.json();
      
      if (data.success) {
        currentSiteId = data.id;
        currentProductName = name || 'Produit';
        currentSiteUrl = data.url;
        
        document.getElementById('resultUrl').href = data.url;
        document.getElementById('resultUrl').textContent = data.url;
        result.style.display = 'block';
        
        // Show Facebook section
        document.getElementById('facebookSection').style.display = 'block';
        checkFacebookStatus();
      } else {
        error.textContent = data.error || 'Erreur lors de la génération';
        error.style.display = 'block';
      }
    } catch (e) {
      error.textContent = 'Erreur: ' + e.message;
      error.style.display = 'block';
    }
    
    btn.disabled = false;
    btn.textContent = '⚡ Générer ma page';
  }
  
  function copyUrl() {
    const url = document.getElementById('resultUrl').textContent;
    navigator.clipboard.writeText(url);
    alert('✅ Lien copié!');
  }
  
  // Facebook Functions
  function connectFacebook() {
    const clientId = '1489523952768079';
    const redirectUri = encodeURIComponent(window.location.origin + '/auth/callback');
    const scope = encodeURIComponent('pages_manage_posts,pages_read_engagement,pages_show_list');
    const state = encodeURIComponent(currentSiteId + '|' + currentProductName);
    
    const authUrl = `https://www.facebook.com/v19.0/dialog/oauth?client_id=${clientId}&redirect_uri=${redirectUri}&scope=${scope}&response_type=code&state=${state}`;
    
    window.location.href = authUrl;
  }
  
  async function checkFacebookStatus() {
    try {
      const res = await fetch('/api/fb-status?siteId=' + currentSiteId);
      const data = await res.json();
      
      if (data.connected) {
        document.getElementById('fbNotConnected').style.display = 'none';
        document.getElementById('fbStatus').innerHTML = `
          <div class="status-success">
            <p>✅ Publication automatique activée!</p>
            <p style="font-size:12px;margin-top:5px;">📘 Page: ${data.pageName}</p>
            <p style="font-size:11px;margin-top:5px;opacity:0.8;">Posts générés par IA et publiés automatiquement chaque jour.</p>
            <button class="disconnect-btn" onclick="disconnectFacebook()">❌ Déconnecter ma Page</button>
          </div>
        `;
      }
    } catch (e) {
      console.log('Facebook status check:', e);
    }
  }
  
  // Check if returning from OAuth
  const urlParams = new URLSearchParams(window.location.search);
  const oauthSuccess = urlParams.get('fb_connected');
  const pageName = urlParams.get('page_name');
  
  if (oauthSuccess === 'true') {
    document.getElementById('facebookSection').style.display = 'block';
    document.getElementById('fbNotConnected').style.display = 'none';
    document.getElementById('fbStatus').innerHTML = `
      <div class="status-success">
        <p>✅ Publication automatique activée!</p>
        <p style="font-size:12px;margin-top:5px;">📘 Page: ${decodeURIComponent(pageName || 'Votre page')}</p>
        <p style="font-size:11px;margin-top:5px;opacity:0.8;">Posts générés par IA et publiés automatiquement chaque jour.</p>
        <button class="disconnect-btn" onclick="disconnectFacebook()">❌ Déconnecter ma Page</button>
      </div>
    `;
    // Clean URL
    window.history.replaceState({}, document.title, window.location.pathname);
  }
  
  async function disconnectFacebook() {
    if (!confirm('Voulez-vous vraiment déconnecter votre Page Facebook ? Les publications automatiques s\'arrêteront.')) {
      return;
    }
    
    try {
      const res = await fetch('/api/fb-disconnect?siteId=' + currentSiteId);
      const data = await res.json();
      
      if (data.success) {
        document.getElementById('fbNotConnected').style.display = 'block';
        document.getElementById('fbStatus').innerHTML = '';
        alert('✅ Page Facebook déconnectée avec succès.');
      } else {
        alert('❌ Erreur: ' + data.error);
      }
    } catch (e) {
      alert('❌ Erreur: ' + e.message);
    }
  }
  
  document.getElementById('link').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') generate();
  });
  </script>
</body>
</html>
