<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Affiliate Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    .luna-bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: linear-gradient(135deg, #0B1F3A 0%, #2B0F3A 50%, #0B1F3A 100%);
    }
    .luna-canvas { width: 100%; height: 100%; display: block; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    
    .container { max-width: 650px; width: 100%; margin-top: 30px; position: relative; z-index: 1; }
    
    h1 {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle { text-align: center; color: #a5b4fc; margin-bottom: 30px; }
    
    .card {
      background: rgba(18, 18, 42, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 15px;
    }
    
    label { display: block; margin-bottom: 6px; color: #c7d2fe; font-weight: 500; font-size: 14px; }
    
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 15px;
      margin-bottom: 15px;
    }
    
    input::placeholder { color: #6b7280; }
    
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 15px;
      margin-bottom: 15px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
    }
    
    textarea::placeholder { color: #6b7280; }
    
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }
    
    button:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    
    .result {
      margin-top: 15px;
      padding: 15px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      display: none;
    }
    
    .result a { color: #4ade80; word-break: break-all; }
    
    .error {
      margin-top: 15px;
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: #fca5a5;
      display: none;
    }
    
    .logo {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 26px;
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
    }
    
    .templates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
    
    @media (max-width: 500px) {
      .templates { grid-template-columns: repeat(2, 1fr); }
    }
    
    .template-btn {
      flex: 1;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(99,102,241,0.2);
      border-radius: 8px;
      color: #a5b4fc;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
    }
    
    .template-btn.active {
      border-color: #6366f1;
      background: rgba(99,102,241,0.2);
      color: white;
    }
    
    .template-preview {
      font-size: 10px;
      opacity: 0.7;
      display: block;
      margin-top: 3px;
    }
    
    .copy-btn {
      margin-top: 10px;
      padding: 8px;
      font-size: 13px;
      background: rgba(99,102,241,0.3);
    }
    
    .image-preview {
      margin-top: 10px;
      text-align: center;
      display: none;
    }
    
    .image-preview img {
      max-width: 200px;
      max-height: 150px;
      border-radius: 8px;
      border: 2px solid rgba(99,102,241,0.3);
    }
    
    .section-title {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 20px 0 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(99,102,241,0.1);
    }
    
    .footer-text {
      text-align: center; 
      color: #6b7280; 
      font-size: 12px; 
      margin-top: 20px;
    }
    
    /* FACEBOOK SECTION */
    .facebook-card {
      margin-top: 20px;
      padding: 20px;
      background: rgba(24, 119, 242, 0.1);
      border: 2px solid rgba(24, 119, 242, 0.3);
      border-radius: 12px;
      display: none;
    }
    
    .facebook-card h3 {
      margin-bottom: 15px;
      color: #1877f2;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .facebook-card p {
      font-size: 13px;
      color: #a5b4fc;
      margin-bottom: 15px;
    }
    
    .page-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(24, 119, 242, 0.15);
      border: 1px solid rgba(24, 119, 242, 0.3);
      border-radius: 8px;
      color: white;
      text-align: left;
      cursor: pointer;
    }
    
    .page-btn:hover {
      background: rgba(24, 119, 242, 0.25);
    }
    
    .page-btn img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    
    .page-btn .page-name {
      font-weight: 600;
    }
    
    .page-btn .page-hint {
      font-size: 11px;
      opacity: 0.7;
    }
    
    .schedule-status {
      margin-top: 15px;
      padding: 15px;
      border-radius: 8px;
    }
    
    .schedule-status.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    
    .schedule-status.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    
    .schedule-status.loading {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }
    
    .posts-preview {
      margin-top: 15px;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      font-size: 12px;
    }
    
    .post-item {
      padding: 8px;
      margin-bottom: 5px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
    }
    
    .post-item .time {
      color: #1877f2;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- LUNA BACKGROUND ANIMÉ -->
  <div class="luna-bg-container">
    <canvas id="luna-stars-canvas" class="luna-canvas"></canvas>
  </div>
  
  <div class="container">
    <div class="logo">⚡</div>
    <h1>AI Affiliate Builder</h1>
    <p class="subtitle">Générez votre page affiliée en 10 secondes</p>
    
    <div class="card">
      <label>🔗 Votre lien affilié *</label>
      <input type="url" id="link" placeholder="https://votre-lien-affilie.com">
      
      <label>📦 Nom du produit</label>
      <input type="text" id="name" placeholder="Ex: iPhone 15 Pro Max">
      
      <label>🖼️ URL de l'image du produit</label>
      <input type="url" id="image" placeholder="https://exemple.com/image.jpg" onchange="previewImage()">
      <div id="imagePreview" class="image-preview">
        <img id="previewImg" src="" alt="Aperçu">
      </div>
      
      <label>📂 Niche</label>
      <input type="text" id="niche" placeholder="Ex: Fitness, Santé, Technologie">
      
      <label>✍️ Description personnalisée <span style="color:#6b7280;font-weight:normal">(optionnel - sinon généré par IA)</span></label>
      <textarea id="customDescription" placeholder="Décrivez votre produit ou offre ici. Si laissé vide, l'IA générera une description automatiquement..." rows="4"></textarea>
      
      <label>🎯 Points forts <span style="color:#6b7280;font-weight:normal">(optionnel - un par ligne)</span></label>
      <textarea id="customFeatures" placeholder="Ex:&#10;100% naturel&#10;Livraison gratuite&#10;Garantie satisfait ou remboursé" rows="3"></textarea>
      
      <div class="section-title">Choisir un template</div>
      <div class="templates">
        <button class="template-btn active" data-template="modern">✨ Moderne</button>
        <button class="template-btn" data-template="dark">🌙 Dark Pro</button>
        <button class="template-btn" data-template="minimal">◻️ Minimal</button>
        <button class="template-btn" data-template="gradient">🎨 Gradient</button>
        <button class="template-btn" data-template="neon">💡 Néon</button>
        <button class="template-btn" data-template="nature">🌿 Nature</button>
        <button class="template-btn" data-template="recipe">🍽️ Recette</button>
        <button class="template-btn" data-template="holistic">☯️ Holistique</button>
        <button class="template-btn" data-template="mystical">🔮 Mystique</button>
      </div>
      
      <button id="generateBtn" onclick="generate()">⚡ Générer ma page</button>
      
      <div id="error" class="error"></div>
      
      <div id="result" class="result">
        <p style="margin-bottom:8px; color: #4ade80;">✅ Votre page est prête!</p>
        <a id="resultUrl" href="" target="_blank"></a>
        <button class="copy-btn" onclick="copyUrl()">📋 Copier le lien</button>
      </div>
      
      <!-- FACEBOOK AUTO-PUBLISH SECTION -->
      <div id="facebookSection" class="facebook-card">
        <h3>📱 Publication automatique Facebook</h3>
        <p>Cliquez sur votre Page Facebook pour activer la publication automatique (5 posts sur 24h)</p>
        <div id="pagesList"></div>
        <div id="scheduleStatus" class="schedule-status" style="display:none;"></div>
      </div>
    </div>
    
    <p class="footer-text">Propulsé par l'IA • Créé par Publication-Web</p>
  </div>
  
  <script>
  // ============ BACKGROUND ANIMÉ ============
  (function() {
    const canvas = document.getElementById('luna-stars-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    if (!ctx) return;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      createStars();
    }
    
    let stars = [];
    const numStars = 400;

    function createStars() {
      stars = [];
      for (let i = 0; i < numStars; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 0.6 + 0.3,
          alpha: Math.random() * 0.7 + 0.3,
          alphaChange: Math.random() * 0.015 + 0.005,
          twinkleSpeed: Math.random() * 0.015 + 0.003
        });
      }
    }

    let shootingStars = [];
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function animate() {
      ctx.fillStyle = '#0B1F3A';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const gradient = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, 0,
        canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) / 1.5
      );
      gradient.addColorStop(0, 'rgba(43, 15, 58, 0.5)');
      gradient.addColorStop(0.6, 'rgba(43, 15, 58, 0.2)');
      gradient.addColorStop(1, 'rgba(11, 31, 58, 0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < stars.length; i++) {
        const star = stars[i];
        star.alpha += star.alphaChange;
        if (star.alpha >= 1) { star.alpha = 1; star.alphaChange = -star.twinkleSpeed; }
        else if (star.alpha <= 0.2) { star.alpha = 0.2; star.alphaChange = star.twinkleSpeed; }

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(216, 177, 90, ' + (star.alpha * 0.08) + ')';
        ctx.fill();

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 250, 235, ' + star.alpha + ')';
        ctx.fill();
      }

      if (Math.random() < 0.012) {
        shootingStars.push({
          x: Math.random() * canvas.width * 0.8,
          y: Math.random() * 100,
          length: Math.random() * 150 + 80,
          speed: Math.random() * 18 + 10,
          angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
          alpha: 1,
          thickness: Math.random() * 2 + 1.5
        });
      }

      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const star = shootingStars[i];
        const trailGradient = ctx.createLinearGradient(
          star.x, star.y,
          star.x - star.length * Math.cos(star.angle),
          star.y - star.length * Math.sin(star.angle)
        );
        trailGradient.addColorStop(0, 'rgba(255, 255, 255, ' + star.alpha + ')');
        trailGradient.addColorStop(0.3, 'rgba(216, 177, 90, ' + (star.alpha * 0.8) + ')');
        trailGradient.addColorStop(1, 'rgba(216, 177, 90, 0)');

        ctx.beginPath();
        ctx.moveTo(star.x, star.y);
        ctx.lineTo(star.x - star.length * Math.cos(star.angle), star.y - star.length * Math.sin(star.angle));
        ctx.strokeStyle = trailGradient;
        ctx.lineWidth = star.thickness;
        ctx.lineCap = 'round';
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(star.x, star.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, ' + star.alpha + ')';
        ctx.fill();

        star.x += star.speed * Math.cos(star.angle);
        star.y += star.speed * Math.sin(star.angle);
        star.alpha -= 0.008;

        if (star.alpha <= 0 || star.y > canvas.height + 50 || star.x > canvas.width + 50) {
          shootingStars.splice(i, 1);
        }
      }
      requestAnimationFrame(animate);
    }
    animate();
  })();
  
  // ============ FORM LOGIC ============
  let selectedTemplate = 'modern';
  let lastGeneratedUrl = '';
  let lastProductName = '';
  
  document.querySelectorAll('.template-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedTemplate = btn.dataset.template;
    });
  });
  
  function previewImage() {
    const url = document.getElementById('image').value;
    const preview = document.getElementById('imagePreview');
    const img = document.getElementById('previewImg');
    if (url) {
      img.src = url;
      preview.style.display = 'block';
      img.onerror = () => { preview.style.display = 'none'; };
    } else {
      preview.style.display = 'none';
    }
  }
  
  async function generate() {
    const link = document.getElementById('link').value;
    const name = document.getElementById('name').value;
    const image = document.getElementById('image').value;
    const niche = document.getElementById('niche').value;
    const customDescription = document.getElementById('customDescription').value;
    const customFeatures = document.getElementById('customFeatures').value;
    const btn = document.getElementById('generateBtn');
    const result = document.getElementById('result');
    const error = document.getElementById('error');
    
    if (!link) {
      error.textContent = 'Veuillez entrer un lien affilié';
      error.style.display = 'block';
      return;
    }
    
    lastProductName = name || 'Ce produit';
    
    btn.disabled = true;
    btn.textContent = '⏳ Génération en cours...';
    error.style.display = 'none';
    result.style.display = 'none';
    document.getElementById('facebookSection').style.display = 'none';
    
    try {
      const res = await fetch('/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          link,
          name: name || null,
          image: image || null,
          niche: niche || null,
          template: selectedTemplate,
          customDescription: customDescription || null,
          customFeatures: customFeatures || null
        })
      });
      
      const data = await res.json();
      
      if (data.success) {
        lastGeneratedUrl = data.url;
        document.getElementById('resultUrl').href = data.url;
        document.getElementById('resultUrl').textContent = data.url;
        result.style.display = 'block';
        
        // Load Facebook pages after successful generation
        setTimeout(loadFacebookPages, 500);
      } else {
        error.textContent = data.error || 'Erreur lors de la génération';
        error.style.display = 'block';
      }
    } catch (e) {
      error.textContent = 'Erreur: ' + e.message;
      error.style.display = 'block';
    }
    
    btn.disabled = false;
    btn.textContent = '⚡ Générer ma page';
  }
  
  function copyUrl() {
    const url = document.getElementById('resultUrl').textContent;
    navigator.clipboard.writeText(url);
    alert('✅ Lien copié!');
  }
  
  // ============ FACEBOOK AUTO-PUBLISH ============
  async function loadFacebookPages() {
    try {
      const res = await fetch('/api/pages');
      const data = await res.json();
      
      if (data.success && data.pages && data.pages.length > 0) {
        const pagesList = document.getElementById('pagesList');
        pagesList.innerHTML = '';
        
        data.pages.forEach(page => {
          const btn = document.createElement('button');
          btn.className = 'page-btn';
          btn.innerHTML = `
            ${page.picture ? `<img src="${page.picture.data.url}" alt="${page.name}">` : '<span style="font-size:30px;">📘</span>'}
            <div>
              <div class="page-name">${page.name}</div>
              <div class="page-hint">Cliquez pour activer la publication auto</div>
            </div>
          `;
          btn.onclick = () => scheduleAutoPost(page.id, page.name, page.access_token);
          pagesList.appendChild(btn);
        });
        
        document.getElementById('facebookSection').style.display = 'block';
      }
    } catch (e) {
      console.error('Erreur chargement pages Facebook:', e);
    }
  }
  
  async function scheduleAutoPost(pageId, pageName, pageAccessToken) {
    const status = document.getElementById('scheduleStatus');
    status.style.display = 'block';
    status.className = 'schedule-status loading';
    status.innerHTML = '⏳ Configuration de la publication automatique...';
    
    try {
      const res = await fetch('/facebook-publish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'schedule',
          pageId: pageId,
          pageName: pageName,
          pageAccessToken: pageAccessToken,
          siteData: {
            url: lastGeneratedUrl,
            productName: lastProductName,
            image: document.getElementById('image').value
          }
        })
      });
      
      const data = await res.json();
      
      if (data.success) {
        status.className = 'schedule-status success';
        status.innerHTML = `
          <strong style="color:#4ade80;">✅ Publication automatique ACTIVÉE!</strong>
          <div class="posts-preview">
            <p style="margin-bottom:10px;">📅 ${data.scheduledPosts} posts programmés:</p>
            <div class="post-item"><span class="time">Maintenant</span> - Post 1</div>
            <div class="post-item"><span class="time">+5h</span> - Post 2</div>
            <div class="post-item"><span class="time">+10h</span> - Post 3</div>
            <div class="post-item"><span class="time">+15h</span> - Post 4</div>
            <div class="post-item"><span class="time">+20h</span> - Post 5</div>
          </div>
          <p style="margin-top:10px; font-size:12px;">📘 Page: <strong>${pageName}</strong></p>
          <p style="font-size:11px; opacity:0.8; margin-top:5px;">Les posts seront publiés automatiquement chaque heure par notre système.</p>
        `;
      } else {
        status.className = 'schedule-status error';
        status.innerHTML = `❌ Erreur: ${data.error}`;
      }
    } catch (e) {
      status.className = 'schedule-status error';
      status.innerHTML = `❌ Erreur: ${e.message}`;
    }
  }
  
  document.getElementById('link').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') generate();
  });
  </script>
</body>
</html>
